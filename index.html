    <aside class="controls">
        <h3 style="color: #ff8c1a; font-size: 14px; letter-spacing: 1px; margin-bottom: 15px;">CONFIGURAÇÕES</h3>
        
        <button type="button" id="btnCargarGeoJSON" class="map-button">CARREGAR DADOS</button>

        <div class="separator"></div>

        <label>MAPA BASE
            <select id="baseMapSelect">
                <option value="dark">Modo Escuro (CartoDB)</option>
                <option value="streets">OpenStreetMap (Ruas)</option>
                <option value="satellite">Satélite (Esri)</option>
            </select>
        </label>

        <label>MÉTODO ESTATÍSTICO
            <select id="classificationSelect">
                <option value="jenks" selected>Quebras Naturais (Jenks)</option>
                <option value="equal">Intervalos Iguais</option>
                <option value="quartiles">Quartis (25% cada)</option>
            </select>
        </label>

        <label>GAMA DE CORES
            <select id="paletteSelect">
                <option value="reds">Vermelhos</option>
                <option value="purples">Violetas</option>
                <option value="greens">Verdes</option>
                <option value="yellows">Amarelos</option>
                <option value="blues" selected>Azuis</option>
            </select>
        </label>

        <label>SELECIONAR FREGUESIA
            <select id="labelSelect">
                <option value="">Aguardando dados...</option>
            </select>
        </label>

        <div id="infoBox" class="info-card">
            <p id="detailNome"><b>Nome:</b> --</p>
            <p id="detailTaxa"><b>Taxa:</b> --</p>
        </div>
